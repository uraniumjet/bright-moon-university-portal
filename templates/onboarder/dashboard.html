<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Moon University - Identity Provisioning Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased">

    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-600/10 border border-blue-500/20 text-blue-400 flex items-center justify-center text-lg shadow-inner">
                <i class="fa-solid fa-user-gear"></i>
            </div>
            <div>
                <h1 class="text-md font-black tracking-wider uppercase text-white">Identity Provisioning Control</h1>
                <p class="text-[11px] font-mono text-gray-500">Operator Session: {{ admin_id }}</p>
            </div>
        </div>
        <a href="/" class="text-xs font-bold border border-gray-800 hover:border-rose-500/30 bg-gray-950 text-gray-400 hover:text-rose-400 px-4 py-2.5 rounded-xl transition-all shadow-sm flex items-center gap-2">
            <i class="fa-solid fa-power-off text-[10px]"></i> Terminate Session
        </a>
    </header>

    <main class="max-w-6xl mx-auto p-4 sm:p-8 space-y-8">

        <div id="responseAlert" class="hidden max-w-2xl mx-auto p-4 rounded-xl border flex items-start gap-3.5 animate-fadeIn">
            <div id="alertIcon" class="text-base pt-0.5"></div>
            <div class="flex-1">
                <h4 id="alertTitle" class="text-xs font-bold uppercase tracking-wider"></h4>
                <p id="alertBody" class="text-xs mt-1 leading-relaxed font-mono select-all text-gray-300"></p>
            </div>
            <button onclick="closeAlert()" class="text-gray-500 hover:text-gray-400 text-xs focus:outline-none cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <section class="bg-gray-900 border border-gray-800/80 rounded-2xl p-5 sm:p-6 shadow-xl space-y-5">
                <div class="border-b border-gray-800 pb-3 flex items-center gap-3">
                    <span class="text-indigo-400 text-lg"><i class="fa-solid fa-user-graduate"></i></span>
                    <div>
                        <h3 class="text-sm font-bold text-gray-200 tracking-wide">Onboard Matriculating Student</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5">Generates a unique calendar-bound ID and a temporary password key.</p>
                    </div>
                </div>

                <form id="studentForm" onsubmit="submitProvisioning(event, '/api/v1/onboard/student')" class="space-y-4">
                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-1.5">Candidate Full Name</label>
                        <input type="text" name="name" required placeholder="e.g., Yusuf Ahmad Shehu"
                               class="w-full text-xs bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-all font-medium text-white">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-1.5">Assigned Faculty Group</label>
                            <input type="text" name="faculty" required placeholder="e.g., Science & Engineering"
                                   class="w-full text-xs bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-all text-white">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-1.5">Course Specialization</label>
                            <input type="text" name="specialization" required placeholder="e.g., Cyber Security & AI"
                                   class="w-full text-xs bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-all text-white">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-1.5">Academic Degree Tier</label>
                        <select name="level" class="w-full text-xs bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 transition-all text-gray-300">
                            <option value="B.Sc.">Undergraduate Track (B.Sc.)</option>
                            <option value="M.Sc.">Postgraduate Master Track (M.Sc.)</option>
                        </select>
                    </div>

                    <button type="submit" class="w-full text-xs font-bold bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-xl transition-all shadow-md shadow-indigo-950/40 flex items-center justify-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-user-plus"></i> Generate Matriculation Profile
                    </button>
                </form>
            </section>

            <section class="bg-gray-900 border border-gray-800/80 rounded-2xl p-5 sm:p-6 shadow-xl space-y-5">
                <div class="border-b border-gray-800 pb-3 flex items-center gap-3">
                    <span class="text-emerald-400 text-lg"><i class="fa-solid fa-chalkboard-user"></i></span>
                    <div>
                        <h3 class="text-sm font-bold text-gray-200 tracking-wide">Onboard Appointed Faculty Staff</h3>
                        <p class="text-[11px] text-gray-500 mt-0.5">Establishes instructional lecturer identity records across domains.</p>
                    </div>
                </div>

                <form id="facultyForm" onsubmit="submitProvisioning(event, '/api/v1/onboard/faculty')" class="space-y-4">
                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-1.5">Lecturer Full Name</label>
                        <input type="text" name="name" required placeholder="e.g., Dr. Abdullahi Sani Jibril"
                               class="w-full text-xs bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all font-medium text-white">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-1.5">Primary Department</label>
                            <input type="text" name="department" required placeholder="e.g., Computer Science"
                                   class="w-full text-xs bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all text-white">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-1.5">Official Academic Rank</label>
                            <input type="text" name="rank" required placeholder="e.g., Senior Lecturer"
                                   class="w-full text-xs bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all text-white">
                        </div>
                    </div>

                    <button type="submit" class="w-full text-xs font-bold bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-xl transition-all shadow-md shadow-emerald-950/40 flex items-center justify-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-id-card"></i> Provision Faculty Profile
                    </button>
                </form>
            </section>

        </div>
    </main>

    <script>
        async function submitProvisioning(event, endpointUrl) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            const alertBox = document.getElementById('responseAlert');
            const alertIcon = document.getElementById('alertIcon');
            const alertTitle = document.getElementById('alertTitle');
            const alertBody = document.getElementById('alertBody');

            try {
                const response = await fetch(endpointUrl, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Update Alert view state to Success Mode
                    alertBox.className = "max-w-2xl mx-auto p-4 rounded-xl border bg-emerald-950/40 border-emerald-900/40 text-emerald-300 flex items-start gap-3.5 animate-fadeIn";
                    alertIcon.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-400"></i>';
                    alertTitle.innerText = "Identity Record Created Cleanly";
                    alertBody.innerHTML = `Generated ID: <strong>${data.generated_id}</strong> <br> Temporary Secret Pass Token: <strong>${data.temporary_password}</strong> <br><span class="text-[10px] text-gray-400 mt-2 block">(Copied this token allocation for the user profile login validation check.)</span>`;
                    form.reset();
                } else {
                    throw new Error(data.detail || "System processing error during identity compilation.");
                }
            } catch (error) {
                // Update Alert view state to Error Mode
                alertBox.className = "max-w-2xl mx-auto p-4 rounded-xl border bg-rose-950/40 border-rose-900/40 text-rose-300 flex items-start gap-3.5 animate-fadeIn";
                alertIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-rose-400"></i>';
                alertTitle.innerText = "Provisioning Interrupted";
                alertBody.innerText = error.message;
            }
        }

        function closeAlert() {
            document.getElementById('responseAlert').classList.add('hidden');
        }
    </script>
</body>
</html>
